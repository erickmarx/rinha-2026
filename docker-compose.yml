# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS (uso 100%).
#
# Divisao de CPU:
# - 3 APIs: 0.16 CPU cada (juntas usam 0.48)
# - LB: 0.52 CPU
# - Total: 1.0 CPU
#
# Divisao de memoria:
# - 3 APIs: 100M cada = 300M
#   (dataset 60M + VP-Tree ~16M + heap Go = ~76M base + margem)
# - LB: 50M
# - Total: 350M, zero sobra.

x-api-base: &api-base
  image: sua-org/sua-api:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - PORT=8080
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.16"
        memory: 100M
  networks:
    - rinha-net

services:
  api1:
    <<: *api-base

  api2:
    <<: *api-base

  api3:
    <<: *api-base

  lb:
    image: sua-org/seu-lb:latest
    build:
      context: ./lb
      dockerfile: Dockerfile
    environment:
      - BACKENDS=http://api1:8080,http://api2:8080,http://api3:8080
      - LB_LOG=false
    ports:
      - "9999:8080"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
      - api3
    deploy:
      resources:
        limits:
          cpus: "0.52"
          memory: 50M
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
