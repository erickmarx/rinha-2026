# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS (uso 100%).
#
# Divisao de CPU:
# - 4 APIs: 0.12 CPU cada (juntas usam 0.48)
#   Margem de seguranca: usam ~5% do allocado (~0.006 CPU real).
# - LB: 0.52 CPU
# - Total: 1.0 CPU
#
# Divisao de memoria:
# - 4 APIs: 60M cada = 240M
# - LB: 110M
# - Total: 350M, zero sobra.

x-api-base: &api-base
  image: sua-org/sua-api:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - PORT=8080
    - GOMAXPROCS=1
    - GOMEMLIMIT=48MiB
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.24"
        memory: 120M
  networks:
    - rinha-net

services:
  api1:
    <<: *api-base

  api2:
    <<: *api-base

  lb:
    image: sua-org/seu-lb:latest
    build:
      context: ./lb
      dockerfile: Dockerfile
    environment:
      - BACKENDS=http://api1:8080,http://api2:8080
      - LB_LOG=false
      - GOMAXPROCS=1
    ports:
      - "9999:8080"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
      - api3
      - api4
    deploy:
      resources:
        limits:
          cpus: "0.52"
          memory: 110M
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
