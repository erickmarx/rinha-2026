# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS.
#
# Configuracao de teste: 2 APIs (minimo obrigatorio) + LB forte.
# Usa TODA a RAM disponivel (350M) para reduzir pressao do GC do Go
# e aumentar buffers de rede.
#
# Divisao de CPU:
# - 2 APIs: 0.10 CPU cada (juntas usam 0.20)
# - LB: 0.80 CPU
# - Total: 1.0 CPU
#
# Divisao de memoria (total 350M):
# - 2 APIs: 100M cada = 200M (margem enorme para Go runtime + cache)
# - LB: 150M (buffers de conexao + heap do proxy)
# - Total: 350M, zero sobra.

x-api-base: &api-base
  image: sua-org/sua-api:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - PORT=8080
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.10"
        memory: 100M
  networks:
    - rinha-net

services:
  api1:
    <<: *api-base

  api2:
    <<: *api-base

  lb:
    image: sua-org/seu-lb:latest
    build:
      context: ./lb
      dockerfile: Dockerfile
    environment:
      - BACKENDS=http://api1:8080,http://api2:8080
      - LB_LOG=false
    ports:
      - "9999:8080"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.80"
          memory: 150M
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
