# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS.
# Isso significa que api1 + api2 + lb dividem 1 unico core e 350MB.
# Os limites abaixo foram calibrados para nao estourar esses recursos.
#
# Estrategia de divisao de CPU:
# - Cada API recebe 0.4 CPU (juntas usam 0.8)
# - O LB recebe 0.2 CPU (0.2)
# - Total: 1.0 CPU
#
# Estrategia de divisao de memoria:
# - Cada API: 128 MB (dataset mmap 58MB + heap do Go + overhead)
# - LB: 32 MB (binario pequeno em scratch, quase nada de memoria)
# - Total: ~288 MB, sobrando ~62 MB para o kernel Docker.

services:
  api1:
    image: sua-org/sua-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          # 0.4 de 1 CPU. A API eh CPU-bound devido ao KNN scan linear.
          # Com menos que isso, o k6 vai ver timeouts.
          cpus: "0.4"
          memory: 128M
    networks:
      - rinha-net

  api2:
    image: sua-org/sua-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    ports:
      - "8082:8080"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 128M
    networks:
      - rinha-net

  lb:
    image: sua-org/seu-lb:latest
    build:
      context: ./lb
      dockerfile: Dockerfile
    environment:
      - BACKENDS=http://api1:8080,http://api2:8080
      # Em producao com 1 CPU, desligue os logs para maximizar throughput.
      # O log.Printf usa mutex global e syscall write a cada requisicao.
      - LB_LOG=false
    ports:
      - "9999:8080"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          # 0.2 de 1 CPU. O LB eh leve (so repassa bytes), mas precisa de
          # ciclos suficientes para manter conexoes keep-alive abertas.
          cpus: "0.2"
          memory: 32M
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
