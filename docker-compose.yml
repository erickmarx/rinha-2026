# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS.
# Com K-Means, cada API processa ~1000 registros por requisicao (era 1M).
# Isso permite 3 APIs com recursos menores, aumentando throughput e redundancia.
#
# Divisao de CPU:
# - 3 APIs: 0.30 CPU cada (juntas usam 0.9)
# - LB: 0.10 CPU
# - Total: 1.0 CPU
#
# Divisao de memoria:
# - 3 APIs: 100M cada (dataset mmap 60M + overhead)
# - LB: 32M
# - Total: 332M, sobrando ~18M para o kernel Docker.

services:
  api1:
    image: sua-org/sua-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    ports:
      - "8081:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50M
    networks:
      - rinha-net

  api2:
    image: sua-org/sua-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    ports:
      - "8082:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50M
    networks:
      - rinha-net

  api3:
    image: sua-org/sua-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    ports:
      - "8083:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50M
    networks:
      - rinha-net

  lb:
    image: sua-org/seu-lb:latest
    build:
      context: ./lb
      dockerfile: Dockerfile
    environment:
      - BACKENDS=http://api1:8080,http://api2:8080,http://api3:8080
      - LB_LOG=false
    ports:
      - "9999:8080"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
      - api3
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 200M
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
