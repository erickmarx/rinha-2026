# Docker Compose orquestra os containers da aplicacao.
#
# HARDWARE ALVO: 1 CPU e 350 MB de memoria TOTAIS (uso 100%).
#
# Divisao de CPU:
# - 2 APIs: 0.40 CPU cada (juntas usam 0.80)
# - LB: 0.20 CPU
# - Total: 1.0 CPU
#
# Divisao de memoria:
# - 2 APIs: 150M cada = 300M
# - LB: 50M
# - Total: 350M, zero sobra.

x-api-base: &api-base
  image: sua-org/sua-api:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - PORT=8080
    - GOMAXPROCS=1
    - GOMEMLIMIT=48MiB
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: 150M
  networks:
    - rinha-net
  volumes:
    - sockets:/sockets

services:
  api1:
    <<: *api-base
    environment:
      - UDS_PATH=/sockets/api1.sock
      - GOMAXPROCS=1
      - GOMEMLIMIT=48MiB

  api2:
    <<: *api-base
    environment:
      - UDS_PATH=/sockets/api2.sock
      - GOMAXPROCS=1
      - GOMEMLIMIT=48MiB

  lb:
    image: sua-org/haproxy-lb:latest
    build:
      context: ./haproxy
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50M
    networks:
      - rinha-net
    volumes:
      - sockets:/sockets

volumes:
  sockets:

networks:
  rinha-net:
    driver: bridge
